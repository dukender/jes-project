<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจัดการโครงการ</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    * { box-sizing: border-box; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-white">
  <div id="app" class="h-full w-full bg-white overflow-auto"></div>
  <script>
  // Initialize Element SDK
  window.elementSdk?.init({
    defaultConfig: {},
    onConfigChange: async () => {},
    mapToCapabilities: () => ({ recolorables: [], borderables: [], fontEditable: undefined, fontSizeable: undefined }),
    mapToEditPanelValues: () => new Map()
  });

  class ProjectManager {
    constructor() {
      this.projects = this.loadProjects();
      this.sharedDocOptions = this.loadDocOptions();
      this.activeProjectId = null;
      this.searchQuery = '';
      this.filterStatus = 'ทั้งหมด';
      this.filterDate = '';
      this.validationError = false;
      this.isSaving = false;
      this.expandedSections = { part1: false, part5: false, part6: false, part7: false };
      this.monthPickerYear = new Date().getFullYear();
      this.monthPickerMonth = new Date().getMonth();
      this.setupEventListeners();
      this.render();
    }

    setupEventListeners() {
      document.addEventListener('click', (e) => {
        if (e.target.closest('[data-toggle-lost-job]')) {
          const projectId = e.target.closest('[data-toggle-lost-job]').dataset.projectId;
          this.toggleLostJob(projectId);
        }
        // Close month picker when clicking outside
        const monthPickerContainer = document.getElementById('monthPickerContainer');
        if (monthPickerContainer && !monthPickerContainer.contains(e.target)) {
          this.closeMonthPicker();
        }
      });
    }

    loadProjects() {
      const saved = localStorage.getItem('multi_project_v11');
      return saved ? JSON.parse(saved) : [];
    }

    loadDocOptions() {
      const saved = localStorage.getItem('doc_options_v11');
      return saved ? JSON.parse(saved) : ["BOQ", "Datasheet", "Price list", "PO", "PR"];
    }

    saveProjects() {
      localStorage.setItem('multi_project_v11', JSON.stringify(this.projects));
    }

    saveDocOptions() {
      localStorage.setItem('doc_options_v11', JSON.stringify(this.sharedDocOptions));
    }

    getCurrentTimestamp() {
      return new Date().toISOString();
    }

    formatDisplayTime(isoString) {
      if (!isoString) return '-';
      const date = new Date(isoString);
      return `${date.toLocaleDateString('th-TH')} ${date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}`;
    }

    calculateAutoStatus(project) {
      if (project.status === 'ไม่ได้งาน') return 'ไม่ได้งาน';
      
      const timestamps = [
        { status: 'ได้งานแล้ว', time: project.part6?.deliveryDate ? new Date(project.part6.deliveryDate).getTime() : 0 },
        { status: 'กำลังติดตั้ง', time: (project.part5?.installDate || project.part5?.internalStaff?.length > 0 || project.part5?.contractors?.length > 0) ? new Date().getTime() : 0 },
        { status: 'ส่งข้อมูลให้ลูกค้าแล้ว', time: Math.max(0, ...project.part4.items.map(i => new Date(i.timestamp).getTime())) },
        { status: 'กำลังแก้ไข', time: Math.max(0, ...project.part3.items.map(i => new Date(i.timestamp).getTime())) },
        { status: 'กำลังดำเนินการ', time: Math.max(0, ...project.part2.items.map(i => new Date(i.lastUpdated).getTime())) },
        { status: 'รับงานแล้ว', time: project.part1.receivedDate ? new Date(project.part1.receivedDate).getTime() : 0 }
      ];
      
      const latest = [...timestamps].sort((a, b) => b.time - a.time)[0];
      
      if (latest.time === 0) {
        if (project.part6?.deliveryDate) return 'ได้งานแล้ว';
        if (project.part5?.installDate) return 'กำลังติดตั้ง';
        if (project.part4?.items?.length > 0) return 'ส่งข้อมูลให้ลูกค้าแล้ว';
        if (project.part3?.items?.length > 0) return 'กำลังแก้ไข';
        return 'กำลังดำเนินการ';
      }

      return latest.status;
    }

    getStatusStyle(status) {
      const styles = {
        'ได้งานแล้ว': 'bg-green-100 text-green-700 border-green-300',
        'ไม่ได้งาน': 'bg-red-100 text-red-700 border-red-300',
        'กำลังติดตั้ง': 'bg-orange-100 text-orange-700 border-orange-300',
        'กำลังแก้ไข': 'bg-amber-100 text-amber-700 border-amber-300',
        'ส่งข้อมูลให้ลูกค้าแล้ว': 'bg-indigo-100 text-indigo-700 border-indigo-300',
      };
      return styles[status] || 'bg-blue-100 text-blue-700 border-blue-300';
    }

    createNewProject() {
      const newProject = {
        id: Date.now().toString(),
        createdAt: this.getCurrentTimestamp(),
        updatedAt: this.getCurrentTimestamp(),
        status: 'กำลังดำเนินการ',
        part1: { received: false, receivedDate: '', customerName: '', companyName: '', projectName: '', salesName: '', channel: 'Facebook' },
        part2: { items: [] },
        part3: { items: [] },
        part4: { items: [] },
        part5: { internalStaff: [], contractors: [], installDate: '' },
        part6: { deliveryDate: '' },
        part7: { startDate: '', durationMonths: '12' }
      };
      this.projects.unshift(newProject);
      this.saveProjects();
      this.activeProjectId = newProject.id;
      this.render();
    }

    deleteProject(id) {
      if (confirm('ต้องการลบโปรเจกต์นี้ใช่หรือไม่?')) {
        this.projects = this.projects.filter(p => p.id !== id);
        this.saveProjects();
        this.render();
      }
    }

    openProject(id) {
      this.activeProjectId = id;
      this.validationError = false;
      this.render();
    }

    closeProject() {
      const project = this.projects.find(p => p.id === this.activeProjectId);
      if (project && !this.validatePart1(project)) {
        this.validationError = true;
        setTimeout(() => window.scrollTo({top: 0, behavior: 'smooth'}), 100);
        return;
      }
      this.validationError = false;
      this.isSaving = true;
      this.render();
      setTimeout(() => {
        this.isSaving = false;
        this.activeProjectId = null;
        this.render();
      }, 300);
    }

    validatePart1(project) {
      if (!project.part1.received) return true;
      const { salesName, channel, customerName, companyName, projectName } = project.part1;
      return !!(salesName && channel && customerName && companyName && projectName);
    }

    toggleLostJob(projectId) {
      this.projects = this.projects.map(p => {
        if (p.id === projectId) {
          return { ...p, status: p.status === 'ไม่ได้งาน' ? 'กำลังดำเนินการ' : 'ไม่ได้งาน' };
        }
        return p;
      });
      this.saveProjects();
      this.render();
    }

    toggleSection(section) {
      this.expandedSections[section] = !this.expandedSections[section];
      this.render();
    }

    toggleMonthPicker() {
      const dropdown = document.getElementById('monthPickerDropdown');
      if (dropdown.classList.contains('hidden')) {
        dropdown.classList.remove('hidden');
        this.updateMonthGrid();
      } else {
        this.closeMonthPicker();
      }
    }

    closeMonthPicker() {
      const dropdown = document.getElementById('monthPickerDropdown');
      dropdown.classList.add('hidden');
    }

    updateMonthGrid() {
      const monthGrid = document.getElementById('monthGrid');
      const display = document.getElementById('monthPickerYearDisplay');
      display.textContent = this.monthPickerYear;

      const monthNames = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
      monthGrid.innerHTML = monthNames.map((month, idx) => {
        const dateStr = `${this.monthPickerYear}-${String(idx + 1).padStart(2, '0')}`;
        const isSelected = this.filterDate === dateStr;
        return `
          <button 
            onclick="app.selectMonth(${idx}, ${this.monthPickerYear})"
            class="py-2 px-2 rounded-lg text-xs font-bold transition-all ${isSelected ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-50 text-slate-700 hover:bg-blue-100'}"
          >
            ${month}
          </button>
        `;
      }).join('');
    }

    selectMonth(month, year) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}`;
      this.filterDate = dateStr;
      const monthNames = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
      document.getElementById('monthPickerDisplay').textContent = `${monthNames[month]} ${year}`;
      this.closeMonthPicker();
      this.render();
    }

    previousMonthYear() {
      this.monthPickerYear--;
      this.updateMonthGrid();
      lucide.createIcons();
    }

    nextMonthYear() {
      this.monthPickerYear++;
      this.updateMonthGrid();
      lucide.createIcons();
    }

    // Part 2 Methods
    addPart2Item() {
      this.updateProject(p => ({
        ...p,
        part2: {
          items: [...p.part2.items, {
            id: Date.now(),
            checked: false,
            docType: this.sharedDocOptions[0] || 'BOQ',
            customerRequirement: '',
            lastUpdated: this.getCurrentTimestamp(),
            isSelf: { checked: false, staffName: '', detail: '' },
            isForward: { checked: false, targetName: '', detail: '' }
          }]
        }
      }));
    }

    togglePart2Item(idx) {
      this.updateProject(p => {
        p.part2.items[idx].checked = !p.part2.items[idx].checked;
        return p;
      });
    }

    updatePart2DocType(idx, value) {
      if (value && !this.sharedDocOptions.includes(value)) {
        this.sharedDocOptions.push(value);
        this.saveDocOptions();
      }
      this.updateProject(p => {
        p.part2.items[idx].docType = value;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    showPart2Suggestions(idx, query) {
      const suggestionsDiv = document.getElementById(`suggestions-part2-${idx}`);
      if (!suggestionsDiv) return;
      if (query.trim().length > 0) {
        suggestionsDiv.classList.remove('hidden');
      } else {
        suggestionsDiv.classList.add('hidden');
      }
    }

    hidePart2Suggestions(idx) {
      const suggestionsDiv = document.getElementById(`suggestions-part2-${idx}`);
      if (suggestionsDiv) suggestionsDiv.classList.add('hidden');
    }

    selectPart2Doc(idx, value) {
      const input = document.querySelector(`[data-part2-input="${idx}"]`);
      if (input) {
        input.value = value;
        this.updatePart2DocType(idx, value);
        this.hidePart2Suggestions(idx);
      }
    }

    updatePart2Requirement(idx, value) {
      this.updateProject(p => {
        p.part2.items[idx].customerRequirement = value;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    togglePart2Self(idx) {
      this.updateProject(p => {
        p.part2.items[idx].isSelf.checked = !p.part2.items[idx].isSelf.checked;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    updatePart2SelfStaff(idx, value) {
      this.updateProject(p => {
        p.part2.items[idx].isSelf.staffName = value;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    updatePart2SelfDetail(idx, value) {
      this.updateProject(p => {
        p.part2.items[idx].isSelf.detail = value;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    togglePart2Forward(idx) {
      this.updateProject(p => {
        p.part2.items[idx].isForward.checked = !p.part2.items[idx].isForward.checked;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    updatePart2ForwardName(idx, value) {
      this.updateProject(p => {
        p.part2.items[idx].isForward.targetName = value;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    updatePart2ForwardDetail(idx, value) {
      this.updateProject(p => {
        p.part2.items[idx].isForward.detail = value;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    removePart2Item(idx) {
      this.updateProject(p => {
        p.part2.items.splice(idx, 1);
        return p;
      });
    }

    // Part 3 Methods
    addPart3Item() {
      this.updateProject(p => ({
        ...p,
        part3: {
          items: [...p.part3.items, {
            id: Date.now(),
            checked: false,
            docType: this.sharedDocOptions[0] || 'BOQ',
            timestamp: this.getCurrentTimestamp(),
            description: '',
            isSelf: { checked: false, staffName: '', detail: '' },
            isForward: { checked: false, targetName: '', detail: '' }
          }]
        }
      }));

    updatePart3DocType(idx, value) {

      if (suggestionsDiv) suggestionsDiv.classList.add('hidden');

    selectPart3Doc(idx, value) {
      const input = document.querySelector(`[data-part3-input="${idx}"]`);
      if (input) {
        input.value = value;
        this.updatePart3DocType(idx, value);
        this.hidePart3Suggestions(idx);
      }
    }

    updatePart3Description(idx, value) {
      this.updateProject(p => {
        p.part3.items[idx].description = value;
        return p;
      });
    }

    togglePart3Self(idx) {
      this.updateProject(p => {
        p.part3.items[idx].isSelf.checked = !p.part3.items[idx].isSelf.checked;
        return p;
      });
    }

    updatePart3SelfStaff(idx, value) {
      this.updateProject(p => {
        p.part3.items[idx].isSelf.staffName = value;
        return p;
      });
    }

    updatePart3SelfDetail(idx, value) {
      this.updateProject(p => {
        p.part3.items[idx].isSelf.detail = value;
        return p;
      });
    }

    togglePart3Forward(idx) {
      this.updateProject(p => {
        p.part3.items[idx].isForward.checked = !p.part3.items[idx].isForward.checked;
        return p;
      });
    }

    updatePart3ForwardName(idx, value) {
      this.updateProject(p => {
        p.part3.items[idx].isForward.targetName = value;
        return p;
      });
    }

    updatePart3ForwardDetail(idx, value) {
      this.updateProject(p => {
        p.part3.items[idx].isForward.detail = value;
        return p;
      });
    }

    removePart3Item(idx) {
      this.updateProject(p => {
        p.part3.items.splice(idx, 1);
        return p;
      });
    }

    // Part 4 Methods
    addPart4Item() {
      this.updateProject(p => ({
        ...p,
        part4: {
          items: [...p.part4.items, {
            id: Date.now(),
            checked: false,
            docType: this.sharedDocOptions[0] || 'BOQ',
            timestamp: this.getCurrentTimestamp()
          }]
        }
      }));
    }

    togglePart4Item(idx) {
      this.updateProject(p => {
        p.part4.items[idx].checked = !p.part4.items[idx].checked;
        return p;
      });
    }

    updatePart4DocType(idx, value) {
      if (value && !this.sharedDocOptions.includes(value)) {
        this.sharedDocOptions.push(value);
        this.saveDocOptions();
      }
      this.updateProject(p => {
        p.part4.items[idx].docType = value;
        return p;
      });
    }

    showPart4Suggestions(idx, query) {
      const suggestionsDiv = document.getElementById(`suggestions-part4-${idx}`);
      if (!suggestionsDiv) return;
      if (query.trim().length > 0) {
        suggestionsDiv.classList.remove('hidden');
      } else {
        suggestionsDiv.classList.add('hidden');
      }
    }

    hidePart4Suggestions(idx) {
      const suggestionsDiv = document.getElementById(`suggestions-part4-${idx}`);
      if (suggestionsDiv) suggestionsDiv.classList.add('hidden');
    }

    selectPart4Doc(idx, value) {
      const input = document.querySelector(`[data-part4-input="${idx}"]`);
      if (input) {
        input.value = value;
        this.updatePart4DocType(idx, value);
        this.hidePart4Suggestions(idx);
      }
    }

    addNewDocOption(part, idx) {
      const inputSelector = part === 'part2' ? `[data-part2-input="${idx}"]` : part === 'part3' ? `[data-part3-input="${idx}"]` : `[data-part4-input="${idx}"]`;
      const input = document.querySelector(inputSelector);
      if (input && input.value.trim().length > 0) {
        const newValue = input.value.trim();
        if (!this.sharedDocOptions.includes(newValue)) {
          this.sharedDocOptions.push(newValue);
          this.saveDocOptions();
          this.render();
        }
        if (part === 'part2') this.updatePart2DocType(idx, newValue);
        if (part === 'part3') this.updatePart3DocType(idx, newValue);
        if (part === 'part4') this.updatePart4DocType(idx, newValue);
        if (part === 'part2') this.hidePart2Suggestions(idx);
        if (part === 'part3') this.hidePart3Suggestions(idx);
        if (part === 'part4') this.hidePart4Suggestions(idx);
      }
    }

    deleteDocOption(option) {
      this.sharedDocOptions = this.sharedDocOptions.filter(opt => opt !== option);
      this.saveDocOptions();
      this.render();
    }

    removePart4Item(idx) {
      this.updateProject(p => {
        p.part4.items.splice(idx, 1);
        return p;
      });
    }

    // Part 5 Methods
    addPart5InternalStaff() {
      this.updateProject(p => ({
        ...p,
        part5: {
          ...p.part5,
          internalStaff: [...p.part5.internalStaff, { id: Date.now(), name: '', detail: '' }]
        }
      }));
    }

    updatePart5InternalStaffName(idx, value) {
      this.updateProject(p => {
        p.part5.internalStaff[idx].name = value;
        return p;
      });
    }

    updatePart5InternalStaffDetail(idx, value) {
      this.updateProject(p => {

        return p;

    }

    removePart5InternalStaff(idx) {
      this.updateProject(p => {

        return p;
      });
    }

    addPart5Contractor() {
      this.updateProject(p => ({
        ...p,
        part5: {
          ...p.part5,
          contractors: [...p.part5.contractors, { id: Date.now(), name: '', detail: '' }]
        }
      }));
    }

    updatePart5ContractorName(idx, value) {
      this.updateProject(p => {
        p.part5.contractors[idx].name = value;
        return p;
      });
    }

    updatePart5ContractorDetail(idx, value) {
      this.updateProject(p => {
        p.part5.contractors[idx].detail = value;
        return p;
      });
    }

    removePart5Contractor(idx) {
      this.updateProject(p => {
        p.part5.contractors.splice(idx, 1);
        return p;
      });
    }

    updateProject(updater) {
      this.projects = this.projects.map(p => {
        if (p.id === this.activeProjectId) {
          const updated = updater(p);
          updated.status = this.calculateAutoStatus(updated);
          updated.updatedAt = this.getCurrentTimestamp();
          return updated;
        }
        return p;
      });
      this.saveProjects();
      this.render();
    }

    getWarrantyStatus(startDate, months) {
      if (!startDate || !months) return { text: 'ยังไม่ระบุ', color: 'bg-slate-100 text-slate-400', expiry: '-' };
      const start = new Date(startDate);
      const expiry = new Date(start.setMonth(start.getUTCMonth() + parseInt(months)));
      const today = new Date();
      const isExpired = today > expiry;
      return {
        text: isExpired ? 'หมดระยะประกัน' : 'อยู่ในการรับประกัน',
        color: isExpired ? 'bg-red-500 text-white' : 'bg-green-500 text-white',
        expiry: expiry.toLocaleDateString('th-TH')
      };
    }

    renderDashboard() {
      const filtered = this.projects
        .filter(p => {
          const matchesSearch = 
            (p.part1.projectName || '').toLowerCase().includes(this.searchQuery.toLowerCase()) ||
            (p.part1.customerName || '').toLowerCase().includes(this.searchQuery.toLowerCase()) ||
            (p.part1.companyName || '').toLowerCase().includes(this.searchQuery.toLowerCase());
          
          const matchesStatus = this.filterStatus === 'ทั้งหมด' || p.status === this.filterStatus;
          const matchesDate = !this.filterDate || p.createdAt.startsWith(this.filterDate);

          return matchesSearch && matchesStatus && matchesDate;
        })
        .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

      const statusCounts = {
        'กำลังดำเนินการ': filtered.filter(p => p.status === 'กำลังดำเนินการ').length,
        'กำลังแก้ไข': filtered.filter(p => p.status === 'กำลังแก้ไข').length,
        'ส่งข้อมูลให้ลูกค้าแล้ว': filtered.filter(p => p.status === 'ส่งข้อมูลให้ลูกค้าแล้ว').length,
        'กำลังติดตั้ง': filtered.filter(p => p.status === 'กำลังติดตั้ง').length,
        'ได้งานแล้ว': filtered.filter(p => p.status === 'ได้งานแล้ว').length,
        'ไม่ได้งาน': filtered.filter(p => p.status === 'ไม่ได้งาน').length
      };

      const statusOptions = ['ทั้งหมด', 'กำลังดำเนินการ', 'กำลังแก้ไข', 'ส่งข้อมูลให้ลูกค้าแล้ว', 'กำลังติดตั้ง', 'ได้งานแล้ว', 'ไม่ได้งาน'];

      const html = `
