<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project for SaleTeam</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
    .fade-in { animation: fadeIn 0.5s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    * { box-sizing: border-box; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-white">
  <div id="app" class="h-full w-full bg-white overflow-auto"></div>
  
  <!-- เปลี่ยนเป็น script type="module" และรวมร่างโค้ด -->
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // --- Firebase Config ของคุณ ---
  const firebaseConfig = {
    apiKey: "AIzaSyBo0comaBXhHtuxiiNUGFldu-8ZcxtdQ7A",
    authDomain: "work-jes.firebaseapp.com",
    projectId: "work-jes",
    storageBucket: "work-jes.firebasestorage.app",
    messagingSenderId: "112074428386",
    appId: "1:112074428386:web:0c2be99dc00fbda47173bb"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);

  class ProjectManager {
    constructor() {
      // ตั้งค่าเริ่มต้น (ไม่ต้องดึงจาก LocalStorage แล้ว)
      this.projects = [];
      this.sharedDocOptions = ["BOQ", "Datasheet", "Price list", "PO", "PR"];
      this.activeProjectId = null;
      this.searchQuery = '';
      this.filterStatus = 'ทั้งหมด';
      this.filterDate = '';
      this.validationError = false;
      this.isSaving = false;
      this.recentlyDeleted = null; 
      this.expandedSections = { part1: false, part5: false, part6: false, part7: false };
      this.monthPickerYear = new Date().getFullYear();
      this.monthPickerMonth = new Date().getMonth();
      
      this.confirmModalState = null;
      this.undoState = null;
      this.undoTimer = null;
      
      this.isOnline = navigator.onLine; // เพิ่มตัวแปรเช็คสถานะอินเทอร์เน็ต
      this.isNewProject = false; // ตัวแปรเช็คว่าเป็นการกดสร้างงานใหม่หรือไม่
      
      this.setupEventListeners();
      // เรียกใช้ข้อมูลแบบ Realtime จาก Firebase ทันทีที่เปิดเว็บ
      this.initRealtimeData(); 
    }

    // 1. ฟังข้อมูลจาก Cloud Realtime (อัปเดตอัตโนมัติเมื่อเครื่องอื่นกดเซฟ)
    initRealtimeData() {
      const docRef = doc(db, "projects", "main_data");
      onSnapshot(docRef, (snapshot) => {
        console.log("✅ เชื่อมต่อ Firebase สำเร็จและดึงข้อมูลแบบ Realtime แล้ว!"); // เพิ่ม log ให้เช็ค
        if (snapshot.exists()) {
          const data = snapshot.data();
          this.projects = data.projectList || [];
          if (data.docOptions) {
            this.sharedDocOptions = data.docOptions;
          }
        }
        this.render(); 
      });
    }

    // 2. ฟังก์ชันหลักสำหรับดันข้อมูลขึ้น Cloud Firestore
    async saveToFirebase() {
      try {
        const docRef = doc(db, "projects", "main_data");
        await setDoc(docRef, { 
          projectList: this.projects,
          docOptions: this.sharedDocOptions,
          lastUpdated: new Date().toISOString()
        });
        console.log("☁️ บันทึกข้อมูลขึ้น Firebase สำเร็จ!"); // เพิ่ม log ให้เช็คเวลาเซฟข้อมูล
      } catch (error) {
        console.error("Error saving to Firebase: ", error);
      }
    }

    // 3. แทนที่ฟังก์ชัน save เดิม ให้เรียกใช้ Firebase แทน LocalStorage
    saveProjects() { 
      this.saveToFirebase(); 
    }

    saveDocOptions() { 
      this.saveToFirebase(); 
    }

    setupEventListeners() {
      document.addEventListener('click', (e) => {
        if (e.target.closest('[data-toggle-lost-job]')) {
          const projectId = e.target.closest('[data-toggle-lost-job]').dataset.projectId;
          this.toggleLostJob(projectId);
        }
        // Close month picker when clicking outside
        const monthPickerContainer = document.getElementById('monthPickerContainer');
        if (monthPickerContainer && !monthPickerContainer.contains(e.target)) {
          this.closeMonthPicker();
        }
      });

      // --- เพิ่มระบบดักจับสถานะอินเทอร์เน็ต (Online/Offline) ---
      window.addEventListener('online', () => { 
        this.isOnline = true; 
        this.render(); 
      });
      window.addEventListener('offline', () => { 
        this.isOnline = false; 
        this.render(); 
      });
    }

    getCurrentTimestamp() {
      return new Date().toISOString();
    }

    formatDisplayTime(isoString) {
      if (!isoString) return '-';
      const date = new Date(isoString);
      return `${date.toLocaleDateString('th-TH')} ${date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}`;
    }

    calculateAutoStatus(project) {
      if (project.status === 'ไม่ได้งาน') return 'ไม่ได้งาน';
      
      const timestamps = [
        { status: 'ได้งานแล้ว', time: project.part6?.deliveryDate ? new Date(project.part6.deliveryDate).getTime() : 0 },
        { status: 'กำลังติดตั้ง', time: (project.part5?.installDate || project.part5?.internalStaff?.length > 0 || project.part5?.contractors?.length > 0) ? new Date().getTime() : 0 },
        { status: 'ส่งข้อมูลให้ลูกค้าแล้ว', time: Math.max(0, ...project.part4.items.map(i => new Date(i.timestamp).getTime())) },
        { status: 'กำลังแก้ไข', time: Math.max(0, ...project.part3.items.map(i => new Date(i.timestamp).getTime())) },
        { status: 'กำลังดำเนินการ', time: Math.max(0, ...project.part2.items.map(i => new Date(i.lastUpdated).getTime())) },
        { status: 'รับงานแล้ว', time: project.part1.receivedDate ? new Date(project.part1.receivedDate).getTime() : 0 }
      ];
      
      const latest = [...timestamps].sort((a, b) => b.time - a.time)[0];
      
      if (latest.time === 0) {
        if (project.part6?.deliveryDate) return 'ได้งานแล้ว';
        if (project.part5?.installDate) return 'กำลังติดตั้ง';
        if (project.part4?.items?.length > 0) return 'ส่งข้อมูลให้ลูกค้าแล้ว';
        if (project.part3?.items?.length > 0) return 'กำลังแก้ไข';
        return 'กำลังดำเนินการ';
      }

      return latest.status;
    }

    getStatusStyle(status) {
      const styles = {
        'ได้งานแล้ว': 'bg-green-100 text-green-700 border-green-300',
        'ไม่ได้งาน': 'bg-red-100 text-red-700 border-red-300',
        'กำลังติดตั้ง': 'bg-orange-100 text-orange-700 border-orange-300',
        'กำลังแก้ไข': 'bg-amber-100 text-amber-700 border-amber-300',
        'ส่งข้อมูลให้ลูกค้าแล้ว': 'bg-indigo-100 text-indigo-700 border-indigo-300',
      };
      return styles[status] || 'bg-blue-100 text-blue-700 border-blue-300';
    }

	createNewProject() {
      const newProject = {
        id: Date.now().toString(),
        createdAt: this.getCurrentTimestamp(),
        updatedAt: this.getCurrentTimestamp(),
        status: 'กำลังดำเนินการ',
        part1: {
          received: true,
          receivedDate: this.getCurrentTimestamp(),
          customerName: '',
          companyName: '',
          projectName: '',
          salesName: '',
          channel: 'Line',
          jobDetails: '' // เพิ่มฟิลด์รายละเอียดงานเบื้องต้น
        },
        part2: { items: [] },
        part3: { items: [] },
        part4: { items: [] },
        part5: { internalStaff: [], contractors: [], installDate: '' },
        part6: { deliveryDate: '' },
        part7: { startDate: '', durationMonths: '12' }
      };

      this.projects.unshift(newProject);
      
      // เอาคำสั่ง this.saveProjects(); ออกจากตรงนี้ เพื่อไม่ให้เกิดแถวว่างในฐานข้อมูลทันทีที่กดปุ่ม

      // บังคับเปลี่ยนหน้าไปที่โครงการใหม่
      this.activeProjectId = newProject.id;
      this.isNewProject = true; // แฟล็กไว้ว่านี่คือการเพิ่มงานใหม่ (ยังไม่สมบูรณ์)
      
      // กำหนดให้ part1 เป็น true และส่วนที่เหลือ (2-7) เป็น false ทั้งหมด
      this.expandedSections = {
        part1: true,
        part2: false,
        part3: false,
        part4: false,
        part5: false,
        part6: false,
        part7: false
      };

      this.validationError = false;
      this.render();
    }

    // --- ระบบแจ้งเตือนยืนยันลบ และ เลิกทำ (Undo) ---
    showConfirm(message, executeFn, undoType, undoDataObj) {
      this.confirmModalState = { message, executeFn, undoType, undoDataObj };
      this.render();
    }

    confirmDelete() {
      if (this.confirmModalState) {
        const { executeFn, undoType, undoDataObj } = this.confirmModalState;
        executeFn(); 
        this.undoState = { type: undoType, data: undoDataObj, message: 'ลบข้อมูลเรียบร้อยแล้ว' };
        this.confirmModalState = null;
        this.render();
        
        if (this.undoTimer) clearTimeout(this.undoTimer);
        this.undoTimer = setTimeout(() => { this.undoState = null; this.render(); }, 10000); 
      }
    }

    cancelDelete() {
      this.confirmModalState = null;
      this.render();
    }

    executeUndo() {
      if (!this.undoState) return;
      const { type, data } = this.undoState;

      if (type === 'project') {
        this.projects.splice(data.index, 0, data.item);
        this.saveProjects();
      } else {
        this.updateProject(p => {
          if (type === 'part2') p.part2.items.splice(data.index, 0, data.item);
          if (type === 'part3') p.part3.items.splice(data.index, 0, data.item);
          if (type === 'part4') p.part4.items.splice(data.index, 0, data.item);
          if (type === 'part5_internal') p.part5.internalStaff.splice(data.index, 0, data.item);
          if (type === 'part5_contractor') p.part5.contractors.splice(data.index, 0, data.item);
          return p;
        });
      }
      this.undoState = null;
      if (this.undoTimer) clearTimeout(this.undoTimer);
      this.render();
    }

    renderConfirmModal() {
      return `
        <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4 fade-in">
          <div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl border border-slate-200">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
              <i data-lucide="alert-triangle" style="width:32px;height:32px"></i>
            </div>
            <h3 class="text-xl font-black text-slate-800 text-center mb-2">ยืนยันการลบ</h3>
            <p class="text-slate-500 text-center text-sm mb-8">${this.confirmModalState.message}</p>
            <div class="flex gap-3">
              <button onclick="app.cancelDelete()" class="flex-1 py-3 px-4 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors">ยกเลิก</button>
              <button onclick="app.confirmDelete()" class="flex-1 py-3 px-4 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 shadow-md shadow-red-200 transition-colors">ยืนยันลบ</button>
            </div>
          </div>
        </div>
      `;
    }

    renderUndoToast() {
      return `
        <div class="fixed bottom-6 right-6 z-[100] fade-in">
          <div class="bg-slate-800 text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-4">
            <div class="flex items-center gap-3">
              <i data-lucide="check-circle-2" class="text-emerald-400" style="width:20px;height:20px"></i>
              <span class="text-sm font-bold">${this.undoState.message}</span>
            </div>
            <div class="w-px h-6 bg-slate-600 hidden md:block"></div>
            <button onclick="app.executeUndo()" class="text-emerald-400 font-black text-sm hover:text-emerald-300 transition-colors flex items-center gap-1">
              <i data-lucide="undo-2" style="width:16px;height:16px"></i> เลิกทำ
            </button>
            <button onclick="app.undoState = null; app.render();" class="text-slate-400 hover:text-white transition-colors ml-2">
              <i data-lucide="x" style="width:16px;height:16px"></i>
            </button>
          </div>
        </div>
      `;
    }
	  
    deleteProject(id) {
      const index = this.projects.findIndex(p => p.id === id);
      if (index !== -1) {
        const projectToDelete = this.projects[index];
        this.showConfirm(
          `คุณต้องการลบโครงการ "${projectToDelete.part1.projectName || 'ไม่ระบุชื่อ'}" ใช่หรือไม่?`,
          () => {
            this.projects.splice(index, 1);
            this.saveProjects();
          },
          'project',
          { item: projectToDelete, index: index }
        );
      }
    }

    openProject(id) {
      this.activeProjectId = id;
      this.isNewProject = false; // ยืนยันว่าเป็นการเปิดงานเก่า ไม่ใช่การสร้างใหม่
      this.validationError = false;
      this.render();
    }

    // --- เพิ่มฟังก์ชันเปลี่ยนแท็บและเลื่อนจอขึ้น ---
    goToNextTab(nextTabId) {
      this.activeTab = nextTabId;
      this.render();
      window.scrollTo({ top: 0, behavior: 'smooth' }); // เลื่อนจอขึ้นบนสุดอย่างนุ่มนวล
    }

    // --- ฟังก์ชันสำหรับการกดย้อนกลับโดยไม่สนการเช็คเงื่อนไข ---
    goBack() {
      // หากกดย้อนกลับในขณะที่อยู่ในโหมด "สร้างงานใหม่" ให้ลบข้อมูลร่างทิ้งทันที
      if (this.isNewProject) {
        this.projects = this.projects.filter(p => p.id !== this.activeProjectId);
        this.saveProjects(); // อัปเดตลบออกจากฐานข้อมูล (ในกรณีที่มีการพิมพ์ข้อความลงไปแล้ว)
        this.isNewProject = false;
      }
      
      this.activeProjectId = null;
      this.validationError = false;
      this.render();
    }

	closeProject() {
      const project = this.projects.find(p => p.id === this.activeProjectId);
      
      // ตรวจสอบข้อมูลส่วนที่ 1 (ถ้าไม่ครบ ให้หยุดและ render ใหม่เพื่อแสดงตัวอักษรเตือน)
      if (project && !this.validatePart1(project)) {
        this.validationError = true;
        this.render(); // สั่งวาดหน้าจอใหม่เพื่อแสดงข้อความ Error สีแดงใต้ช่อง
        
        // เลื่อนหน้าจอไปจุดที่ข้อมูลไม่ครบเพื่อให้ผู้ใช้เห็นตัวอักษรเตือน
        setTimeout(() => {
          const firstError = document.querySelector('.text-red-500');
          if (firstError) {
            firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 100);
        return; 
      }
      
      // ถ้าข้อมูลครบแล้ว ทำการบันทึกตามปกติโดยไม่มีการแจ้งเตือน Pop-up
      this.isNewProject = false; // บันทึกข้อมูลสำเร็จแล้ว ยกเลิกสถานะงานใหม่
      this.validationError = false;
      this.isSaving = true;
      this.render();
      
      setTimeout(() => {
        this.isSaving = false;
        this.activeProjectId = null;
        this.render();
      }, 300);
    }

    validatePart1(project) {
      if (!project.part1.received) return true;
      const { salesName, channel, customerName, companyName, projectName } = project.part1;
      return !!(salesName && channel && customerName && companyName && projectName);
    }

    toggleLostJob(projectId) {
      this.projects = this.projects.map(p => {
        if (p.id === projectId) {
          return { ...p, status: p.status === 'ไม่ได้งาน' ? 'กำลังดำเนินการ' : 'ไม่ได้งาน' };
        }
        return p;
      });
      this.saveProjects();
      this.render();
    }

    toggleSection(section) {
      this.expandedSections[section] = !this.expandedSections[section];
      this.render();
    }

    toggleMonthPicker() {
      const dropdown = document.getElementById('monthPickerDropdown');
      if (dropdown.classList.contains('hidden')) {
        dropdown.classList.remove('hidden');
        this.updateMonthGrid();
      } else {
        this.closeMonthPicker();
      }
    }

    closeMonthPicker() {
      const dropdown = document.getElementById('monthPickerDropdown');
      dropdown.classList.add('hidden');
    }

    updateMonthGrid() {
      const monthGrid = document.getElementById('monthGrid');
      const display = document.getElementById('monthPickerYearDisplay');
      display.textContent = this.monthPickerYear;

      const monthNames = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
      monthGrid.innerHTML = monthNames.map((month, idx) => {
        const dateStr = `${this.monthPickerYear}-${String(idx + 1).padStart(2, '0')}`;
        const isSelected = this.filterDate === dateStr;
        return `
          <button 
            onclick="app.selectMonth(${idx}, ${this.monthPickerYear})"
            class="py-2 px-2 rounded-lg text-xs font-bold transition-all ${isSelected ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-50 text-slate-700 hover:bg-blue-100'}"
          >
            ${month}
          </button>
        `;
      }).join('');
    }

    selectMonth(month, year) {
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}`;
      this.filterDate = dateStr;
      const monthNames = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
      document.getElementById('monthPickerDisplay').textContent = `${monthNames[month]} ${year}`;
      this.closeMonthPicker();
      this.render();
    }

    previousMonthYear() {
      this.monthPickerYear--;
      this.updateMonthGrid();
      lucide.createIcons();
    }

    nextMonthYear() {
      this.monthPickerYear++;
      this.updateMonthGrid();
      lucide.createIcons();
    }

    // Part 2 Methods
    addPart2Item() {
      this.updateProject(p => ({
        ...p,
        part2: {
          items: [...p.part2.items, {
            id: Date.now(),
            checked: false,
            docType: this.sharedDocOptions[0] || 'BOQ',
            customerRequirement: '',
            lastUpdated: this.getCurrentTimestamp(),
            isSelf: { checked: false, staffName: '', detail: '' },
            isForward: { checked: false, targetName: '', detail: '' }
          }]
        }
      }));
    }

    togglePart2Item(idx) {
      this.updateProject(p => {
        p.part2.items[idx].checked = !p.part2.items[idx].checked;
        return p;
      });
    }

    updatePart2DocType(idx, value) {
      if (value && !this.sharedDocOptions.includes(value)) {
        this.sharedDocOptions.push(value);
        this.saveDocOptions();
      }
      this.updateProject(p => {
        p.part2.items[idx].docType = value;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    showPart2Suggestions(idx, query) {
      const suggestionsDiv = document.getElementById(`suggestions-part2-${idx}`);
      if (!suggestionsDiv) return;
      if (query.trim().length > 0) {
        suggestionsDiv.classList.remove('hidden');
      } else {
        suggestionsDiv.classList.add('hidden');
      }
    }

    hidePart2Suggestions(idx) {
      const suggestionsDiv = document.getElementById(`suggestions-part2-${idx}`);
      if (suggestionsDiv) suggestionsDiv.classList.add('hidden');
    }

    selectPart2Doc(idx, value) {
      const input = document.querySelector(`[data-part2-input="${idx}"]`);
      if (input) {
        input.value = value;
        this.updatePart2DocType(idx, value);
        this.hidePart2Suggestions(idx);
      }
    }

    updatePart2Requirement(idx, value) {
      this.updateProject(p => {
        p.part2.items[idx].customerRequirement = value;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    togglePart2Self(idx) {
      this.updateProject(p => {
        p.part2.items[idx].isSelf.checked = !p.part2.items[idx].isSelf.checked;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    updatePart2SelfStaff(idx, value) {
      this.updateProject(p => {
        p.part2.items[idx].isSelf.staffName = value;
        p.part2.items[idx].lastUpdated = this.getCurrentTimestamp();
        return p;
      });
    }

    updatePart2SelfDetail(idx, value) {
      this.updateProject(p => {

    updateProject(updater) {

        if (p.id === this.activeProjectId) {
          const updated = updater(p);
          updated.status = this.calculateAutoStatus(updated);
          updated.updatedAt = this.getCurrentTimestamp();
          return updated;
        }
        return p;
      });
      this.saveProjects();
      this.render();
    }

    getWarrantyStatus(startDate, months) {
      if (!startDate || !months) return { text: 'ยังไม่ระบุ', color: 'bg-slate-100 text-slate-400', expiry: '-' };
      const start = new Date(startDate);
      const expiry = new Date(start.setMonth(start.getUTCMonth() + parseInt(months)));
      const today = new Date();
      const isExpired = today > expiry;
      return {
        text: isExpired ? 'หมดระยะประกัน' : 'อยู่ในการรับประกัน',
        color: isExpired ? 'bg-red-500 text-white' : 'bg-green-500 text-white',
        expiry: expiry.toLocaleDateString('th-TH')
      };
    }

    // --- เพิ่มฟังก์ชัน Export เป็น Excel (CSV) ---
    exportToExcel() {
      if (!this.currentFilteredProjects || this.currentFilteredProjects.length === 0) {
        alert("ไม่มีข้อมูลสำหรับอิมพอร์ต");
        return;
      }
      
      // ใส่ BOM (Byte Order Mark) เพื่อให้ Excel อ่านภาษาไทยได้ถูกต้อง
      let csvContent = "\uFEFF"; 
      csvContent += "สถานะ,ชื่อโครงการ,ลูกค้า,บริษัท,ช่องทาง,ชื่อเซลล์,วันที่รับงาน,อัปเดตล่าสุด\n";
      
      this.currentFilteredProjects.forEach(p => {
         const status = `"${p.status}"`;
         const projName = `"${(p.part1.projectName || '').replace(/"/g, '""')}"`;
         const customer = `"${(p.part1.customerName || '').replace(/"/g, '""')}"`;
         const company = `"${(p.part1.companyName || '').replace(/"/g, '""')}"`;
         const channel = `"${p.part1.channel || ''}"`;
         const salesName = `"${(p.part1.salesName || '').replace(/"/g, '""')}"`;
         const received = `"${this.formatDisplayTime(p.part1.receivedDate).split(' ')[0]}"`;
         const updated = `"${this.formatDisplayTime(p.updatedAt).split(' ')[0]}"`;
         
         csvContent += `${status},${projName},${customer},${company},${channel},${salesName},${received},${updated}\n`;
      });

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `Projects_Export_${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // --- เพิ่มฟังก์ชัน Export เป็น PDF ---
    exportToPDF() {
      if (!this.currentFilteredProjects || this.currentFilteredProjects.length === 0) return;
      
      // ดึงไลบรารี html2pdf มาทำงานแบบ Dynamic (ไม่ต้องแก้ <head>)
      if (!window.html2pdf) {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
          script.onload = () => this.generatePDF();
          document.head.appendChild(script);
      } else {
          this.generatePDF();
      }
    }

    generatePDF() {
        const element = document.getElementById('projectTableContainer');
        if(!element) return;
        
        // ซ่อนคอลัมน์จัดการ (ปุ่มลบ/แก้ไข) เพื่อไม่ให้ออกมาใน PDF
        const actionCols = element.querySelectorAll('.action-col');
        actionCols.forEach(el => el.style.display = 'none');

        const opt = {
          margin:       0.4,
          filename:     `Projects_Export_${new Date().toISOString().split('T')[0]}.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true },
          jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
        };

        // สร้าง PDF และคืนค่าปุ่มจัดการให้กลับมาแสดงเหมือนเดิม
        html2pdf().set(opt).from(element).save().then(() => {
            actionCols.forEach(el => el.style.display = '');
        });
    }

                <div class="absolute top-0 right-0 w-48 h-48 bg-blue-500 rounded-full blur-[80px] opacity-5 -mr-20 -mt-20"></div>
                <h3 class="text-lg font-bold flex items-center gap-2 text-blue-600 relative z-10 mb-8">
                  <i data-lucide="shield-check" style="width:20px;height:20px"></i> ส่วนที่ 7: การรับประกัน
                </h3>
                <div class="relative z-10">
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                      <div>
                        <label class="text-[10px] text-slate-400 uppercase font-bold ml-1 mb-2 block tracking-wider">วันที่เริ่มการรับประกัน</label>
                        <input type="date" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none text-slate-700 focus:border-blue-400 focus:ring-2 focus:ring-blue-50 transition-all" value="${p.part7.startDate}" 
                          onchange="app.updateProject(proj => ({...proj, part7: {...proj.part7, startDate: this.value}}))" />
                      </div>
                      <div>
                        <label class="text-[10px] text-slate-400 uppercase font-bold ml-1 mb-2 block tracking-wider">ระยะเวลารับประกัน (จำนวนเดือน)</label>
                        <div class="flex gap-2 items-center mb-3">
                          <input type="number" placeholder="ตัวอย่าง: 12" class="flex-1 p-3 bg-slate-50 border border-slate-100 rounded-xl text-sm outline-none text-slate-700 focus:border-blue-400 focus:ring-2 focus:ring-blue-50 transition-all" value="${p.part7.durationMonths}" 
                            onchange="app.updateProject(proj => ({...proj, part7: {...proj.part7, durationMonths: this.value}}))" />
                          <span class="text-slate-500 font-bold text-sm">เดือน</span>
                        </div>
                        <div class="flex flex-wrap gap-2">
                          ${['6','12','24','36'].map(m => `
                            <button onclick="app.updateProject(proj => ({...proj, part7: {...proj.part7, durationMonths: '${m}'}}))" 
                              class="text-[10px] px-4 py-1.5 rounded-lg border font-black transition-all ${p.part7.durationMonths === m ? 'bg-blue-600 border-blue-600 text-white shadow-md shadow-blue-100' : 'border-slate-200 text-slate-400 hover:border-blue-300 hover:text-blue-600 bg-white'}">
                              ${m} ด.
                            </button>
                          `).join('')}
                        </div>
                      </div>
                    </div>
                    <div class="bg-blue-50/50 backdrop-blur-sm p-6 rounded-2xl border border-blue-100 flex flex-col items-center justify-center text-center">
                      <div class="px-4 py-1.5 rounded-full text-[10px] font-black mb-4 uppercase tracking-widest ${warranty.color}">${warranty.text}</div>
                      <div class="text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-tighter">วันหมดอายุประกัน</div>
                      <div class="text-3xl text-blue-600 font-black tracking-tight">${warranty.expiry}</div>
                    </div>
                  </div>
                </div>
                
                <!-- ขั้นตอนสุดท้าย: ปุ่มบันทึก -->
                <div class="mt-8 flex justify-end pt-6 border-t border-slate-100">
                  <button onclick="app.closeProject()" class="bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-2xl font-black text-base shadow-lg transition-all flex items-center gap-2 active:scale-95">
                    <i data-lucide="save" style="width:20px;height:20px"></i> บันทึกข้อมูลและเสร็จสิ้น
                  </button>
                </div>
              </section>
              ` : ''}
            </div>
          </div>
        </div>
      `;
      return html;
    }

    // --- เพิ่มฟังก์ชันวาด UI แถบสถานะอินเทอร์เน็ต ---
    renderNetworkStatus() {
      return `
        <div class="fixed top-3 right-4 md:right-8 z-[9999] flex items-center gap-1.5 px-3 py-1.5 bg-white/90 backdrop-blur-md rounded-full shadow-sm border ${this.isOnline ? 'border-green-200' : 'border-red-200'} transition-all">
          <div class="w-2.5 h-2.5 rounded-full ${this.isOnline ? 'bg-green-500 animate-pulse' : 'bg-red-500'}"></div>
          <span class="text-[10px] font-bold ${this.isOnline ? 'text-green-700' : 'text-red-600'}">${this.isOnline ? 'ออนไลน์' : 'ออฟไลน์ (รอสัญญาณ)'}</span>
        </div>
      `;
    }

    render() {
      const appElement = document.getElementById('app');
      if (appElement) {
        let html = this.activeProjectId ? this.renderProjectDetail() : this.renderDashboard();
        
        // แทรกสถานะ Network, Modal และ Toast เข้าไปใน HTML ก่อน Render เสมอ
        html += this.renderNetworkStatus();
        if (this.confirmModalState) html += this.renderConfirmModal();
        if (this.undoState) html += this.renderUndoToast();
        
        appElement.innerHTML = html;
        lucide.createIcons();
      }
    }
  }

  // จุดสำคัญ: ต้องเปลี่ยนเป็น window.app เพื่อให้ HTML หาฟังก์ชันเจอเมื่อใช้ type="module"
  window.app = new ProjectManager();
  </script>
</body>
</html>
